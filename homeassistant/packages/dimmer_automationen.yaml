# Dimmer-Automationen: Licht einschalten → falls Dimmer auf 0, auf 100% setzen
# Damit das Licht nicht "dunkel" eingeschaltet wird

automation:
  - id: dimmer_decke_100_bei_einschalten
    alias: "Dimmer Decke: 100% wenn Licht eingeschaltet und Dimmer=0"
    trigger:
      - platform: state
        entity_id: light.wowa_deckenlicht
        to: "on"
    condition:
      - condition: numeric_state
        entity_id: number.wowa_deckenlicht_helligkeit
        below: 5
    action:
      - service: number.set_value
        target:
          entity_id: number.wowa_deckenlicht_helligkeit
        data:
          value: 100

