      payload_on: "1"
      payload_off: "0"
      device_class: connectivity

    - name: "Heizung aktiv"
      unique_id: hobbyconnect_heater_onoff
      state_topic: "hobbyconnect/state/HEATER_ONOFF"
      payload_on: "1"
      payload_off: "0"
      device_class: heat

    - name: "WoWa Heizung Gas"
      unique_id: hobbyconnect_heater_gas_bin
      state_topic: "hobbyconnect/state/HEATER_GAS"
      payload_on: "On"
      payload_off: "Off"
      device_class: heat

    - name: "TH Heizung verfuegbar"
      unique_id: hobbyconnect_th_available
      state_topic: "hobbyconnect/state/TH_AVAILABLE"
