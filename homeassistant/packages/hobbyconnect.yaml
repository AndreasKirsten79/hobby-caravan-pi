template:
  - sensor:
      - name: "WoWa Wasser Liter"
        unique_id: wowa_wasser_liter
        unit_of_measurement: "L"
        icon: mdi:water
        state: >
          {{ (states('sensor.wowa_wasserstand') | float(0) * 47 / 100) | round(1) }}

      - name: "WoWa Wasser Fehlend bis 75%"
        unique_id: wowa_wasser_fehlend_75
        unit_of_measurement: "L"
        icon: mdi:water-plus
        state: >
          {% set stand = states('sensor.wowa_wasserstand') | float(0) %}
          {% if stand < 75 %}
            {{ ((75 - stand) * 47 / 100) | round(1) }}
          {% else %}
            0
          {% endif %}

      - name: "WoWa Wasser Prozent"
        unique_id: wowa_wasser_prozent
        unit_of_measurement: "%"
        icon: mdi:gauge
        state: >
          {{ states('sensor.wowa_wasserstand') | float(0) | round(0) }}