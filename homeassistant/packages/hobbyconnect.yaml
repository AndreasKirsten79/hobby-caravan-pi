  # ------------------------------------------------------------------
  # DIMMER-Sensoren (nur wenn von deiner HobbyConnect-Box unterstützt)
  # Werte 0-100 = Helligkeit in Prozent
  # Erkenntnisquelle: Community-Analyse rawsludge/esphome PR #13327
  # ------------------------------------------------------------------
    - name: "WoWa Deckenlicht Dimmer"
      unique_id: hobbyconnect_dim_decke
      state_topic: "hobbyconnect/state/LIGHT_DECKE_DIM"
      unit_of_measurement: "%"
      availability_topic: "hobbyconnect/availability"
      icon: mdi:brightness-6

    - name: "WoWa Wandlicht Dimmer"
