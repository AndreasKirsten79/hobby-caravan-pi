      payload_off: "0"
      device_class: connectivity

    - name: "Kuehlschrank verfuegbar"
      unique_id: hobbyconnect_fridge_available
      state_topic: "hobbyconnect/state/FRIDGE_AVAILABLE"
      payload_on: "1"
      payload_off: "0"
      device_class: connectivity

    - name: "Kuehlschrank Ein/Aus"
      unique_id: hobbyconnect_fridge_onoff
      state_topic: "hobbyconnect/state/FRIDGE_ON_OFF"
      payload_on: "1"
      payload_off: "0"

    - name: "PI Pairing aktiv"
      unique_id: hobbyconnect_pi_pairing
      state_topic: "hobbyconnect/state/PI_PAIRING"
      payload_on: "1"
      payload_off: "0"
      device_class: connectivity
      entity_category: diagnostic

  switch:
    - name: "Dometic Klimaanlage"
      unique_id: hobbyconnect_switch_dometic
      state_topic: "hobbyconnect/state/AC_DOM_FJ_ENABLE"
      command_topic: "hobbyconnect/cmd/AC_DOM_FJ_ENABLE"
      payload_on: "1"
      payload_off: "0"
      state_on: "On"
      state_off: "Off"
      availability_topic: "hobbyconnect/availability"
      icon: mdi:air-conditioner

    - name: "WoWa Fussbodenheizung"
      unique_id: hobbyconnect_switch_fussb
      state_topic: "hobbyconnect/state/LIGHT_FUSSB"
      command_topic: "hobbyconnect/cmd/LIGHT_FUSSB"
      payload_on: "1"
      payload_off: "0"
      state_on: "1"
      state_off: "0"
      availability_topic: "hobbyconnect/availability"
      icon: mdi:radiator-disabled

    - name: "WoWa Warmwassertherme"
      unique_id: hobbyconnect_switch_therme
      state_topic: "hobbyconnect/state/LIGHT_THERME"
      command_topic: "hobbyconnect/cmd/LIGHT_THERME"
      payload_on: "1"
      payload_off: "0"
      state_on: "1"
      state_off: "0"
      availability_topic: "hobbyconnect/availability"
      icon: mdi:water-boiler

  number:
    - name: "Dometic Zieltemperatur setzen"
      unique_id: hobbyconnect_number_dometic_temp
      state_topic: "hobbyconnect/state/AC_DOM_FJ_TARGETTEMP"
      command_topic: "hobbyconnect/cmd/AC_DOM_FJ_TARGETTEMP"
      min: 16
      max: 31
      step: 1
      unit_of_measurement: "°C"
      device_class: temperature
      availability_topic: "hobbyconnect/availability"
      icon: mdi:thermometer

  light:
    - name: "WoWa Deckenlicht"
      unique_id: hobbyconnect_light_decke
      state_topic: "hobbyconnect/state/LIGHT_DECKE"
      command_topic: "hobbyconnect/cmd/LIGHT_DECKE"
      payload_on: "1"
      payload_off: "0"
      availability_topic: "hobbyconnect/availability"

    - name: "WoWa Wandlicht"
      unique_id: hobbyconnect_light_wand
      state_topic: "hobbyconnect/state/LIGHT_WAND"
      command_topic: "hobbyconnect/cmd/LIGHT_WAND"
      payload_on: "1"
      payload_off: "0"
      availability_topic: "hobbyconnect/availability"

    - name: "WoWa Kuechenlicht"
      unique_id: hobbyconnect_light_kueche
      state_topic: "hobbyconnect/state/LIGHT_KUECHE"
      command_topic: "hobbyconnect/cmd/LIGHT_KUECHE"
      payload_on: "1"
      payload_off: "0"
      availability_topic: "hobbyconnect/availability"

    - name: "WoWa Aussenlicht"
      unique_id: hobbyconnect_light_aussen
      state_topic: "hobbyconnect/state/LIGHT_AUSSEN"
      command_topic: "hobbyconnect/cmd/LIGHT_AUSSEN"
      payload_on: "1"
      payload_off: "0"
      availability_topic: "hobbyconnect/availability"

    - name: "Ambientelicht Betten"
      unique_id: hobbyconnect_light_amb1
      state_topic: "hobbyconnect/state/LIGHT_AMB1"
      command_topic: "hobbyconnect/cmd/LIGHT_AMB1"
      payload_on: "1"
