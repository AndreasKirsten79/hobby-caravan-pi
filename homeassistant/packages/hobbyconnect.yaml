  select:
    - name: "Dometic Modus"
      unique_id: hobbyconnect_select_dometic_mode
      state_topic: "hobbyconnect/state/AC_DOM_FJ_MODE"
      command_topic: "hobbyconnect/cmd/AC_DOM_FJ_MODE"
      options:
        - "Fan"
        - "Heat"
        - "Cool"
        - "Auto"
        - "Dry"
      availability_topic: "hobbyconnect/availability"
      icon: mdi:air-filter

    - name: "Dometic Lüfterstufe"
      unique_id: hobbyconnect_select_dometic_fan
      state_topic: "hobbyconnect/state/AC_DOM_FJ_FAN_SPEED"
      command_topic: "hobbyconnect/cmd/AC_DOM_FJ_FAN_SPEED"
      options:
        - "Slow"
        - "Med"
        - "Fast"
        - "Max"
        - "Auto"
      availability_topic: "hobbyconnect/availability"
      icon: mdi:fan


    - name: "WoWa Deckenlicht Helligkeit"
      unique_id: hobbyconnect_num_dim_decke
      state_topic: "hobbyconnect/state/LIGHT_DECKE_DIM"
      command_topic: "hobbyconnect/cmd/LIGHT_DECKE_DIM"
      min: 0
      max: 100
      step: 5
      unit_of_measurement: "%"
      availability_topic: "hobbyconnect/availability"
      icon: mdi:brightness-6

    - name: "WoWa Wandlicht Helligkeit"
      unique_id: hobbyconnect_num_dim_wand
      state_topic: "hobbyconnect/state/LIGHT_WAND_DIM"
      command_topic: "hobbyconnect/cmd/LIGHT_WAND_DIM"
      min: 0
      max: 100
      step: 5
      unit_of_measurement: "%"
      availability_topic: "hobbyconnect/availability"
      icon: mdi:brightness-6

    - name: "WoWa Kuechenlicht Helligkeit"
      unique_id: hobbyconnect_num_dim_kueche
      state_topic: "hobbyconnect/state/LIGHT_KUECHE_DIM"
      command_topic: "hobbyconnect/cmd/LIGHT_KUECHE_DIM"
      min: 0
      max: 100
      step: 5
      unit_of_measurement: "%"
      availability_topic: "hobbyconnect/availability"
      icon: mdi:brightness-6

    - name: "Ambientelicht 1 Helligkeit"
      unique_id: hobbyconnect_num_dim_amb1
      state_topic: "hobbyconnect/state/LIGHT_AMB1_DIM"
      command_topic: "hobbyconnect/cmd/LIGHT_AMB1_DIM"
      min: 0
      max: 100
      step: 5
      unit_of_measurement: "%"
      availability_topic: "hobbyconnect/availability"
      icon: mdi:brightness-6

    - name: "Ambientelicht 2 Helligkeit"
      unique_id: hobbyconnect_num_dim_amb2
      state_topic: "hobbyconnect/state/LIGHT_AMB2_DIM"
      command_topic: "hobbyconnect/cmd/LIGHT_AMB2_DIM"
      min: 0
      max: 100
      step: 5
