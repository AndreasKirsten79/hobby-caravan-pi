# ============================================================
# STANDORT & GPS-QUELLE
#
# ANPASSEN:
#   device_tracker.DEIN_GERAET
#   → Entity-ID deines Smartphones/Tablets in HA.
#   Zu finden unter: Einstellungen → Geräte & Dienste → Companion App
#   → dein Gerät → Entity "Geräteverfolgung"
#   Beispiele: device_tracker.pixel_8, device_tracker.samsung_s24
#
#   sensor.DEIN_GERAET_geocoded_location
#   → Geocoding-Sensor (Adresse als Text), wird automatisch
#   von der HA Companion App erstellt.
# ============================================================

template:
  - sensor:
      - name: "WoWa Breitengrad"
        unique_id: wowa_latitude
        icon: mdi:latitude
        state: >
          {{ state_attr('device_tracker.DEIN_GERAET', 'latitude') | round(6) }}

      - name: "WoWa Laengengrad"
        unique_id: wowa_longitude
        icon: mdi:longitude
        state: >
          {{ state_attr('device_tracker.DEIN_GERAET', 'longitude') | round(6) }}

      - name: "WoWa Standort Adresse"
        unique_id: wowa_standort_adresse
        icon: mdi:map-marker
        state: >
          {% set geo = states('sensor.DEIN_GERAET_geocoded_location') %}
          {% if geo not in ['unknown','unavailable',''] %}
            {{ geo }}
          {% else %}
            Standort wird ermittelt...
          {% endif %}

      - name: "WoWa Zeitzone"
        unique_id: wowa_zeitzone
        icon: mdi:clock-outline
        state: >
          {{ states('sensor.DEIN_GERAET_current_time_zone') }}

# ============================================================
# AUTOMATION: HA Home-Koordinaten dem Standort des Geräts
# anpassen — damit weather.forecast_home immer die Vorhersage
# für den aktuellen Stellplatz zeigt, nicht für Zuhause.
# ============================================================
automation:
  - id: wowa_standort_home_koordinaten_aktualisieren
    alias: "WoWa: HA Home-Koordinaten nach Tablet-GPS aktualisieren"
    trigger:
      - platform: state
        entity_id: device_tracker.DEIN_GERAET
    condition:
      - condition: template
        value_template: >
          {{ state_attr('device_tracker.DEIN_GERAET', 'latitude') != None and
             state_attr('device_tracker.DEIN_GERAET', 'longitude') != None }}
    action:
      - service: homeassistant.set_location
        data:
          latitude: "{{ state_attr('device_tracker.DEIN_GERAET', 'latitude') }}"
          longitude: "{{ state_attr('device_tracker.DEIN_GERAET', 'longitude') }}"
    mode: single
    max_exceeded: silent
