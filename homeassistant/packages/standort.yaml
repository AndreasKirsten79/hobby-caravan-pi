# ============================================================
# STANDORT & ZONE DYNAMISCH
#
# ANPASSEN – 3 Stellen:
#
# 1. device_tracker.DEIN_GERAET
#    → Der Entity-ID deines Smartphones in HA.
#    Zu finden unter: Einstellungen → Geräte & Dienste → Companion App
#    → dein Gerät → Entity "Geräteverfolgung"
#    Beispiele: device_tracker.pixel_8, device_tracker.samsung_s24
#
# 2. sensor.DEIN_GERAET_geocoded_location
#    → Der Geocoding-Sensor deines Smartphones (Adresse als Text).
#    Wird automatisch von der HA Companion App erstellt.
#    Name-Schema: sensor.GERAETENAME_geocoded_location
#
# 3. "Zuhause (Dein Ort)"
#    → Der angezeigte Text wenn du zuhause bist.
#    Ersetze durch deinen Heimatort, z.B. "Zuhause (München)"
# ============================================================

template:
  - sensor:
      - name: "WoWa Breitengrad"
        unique_id: wowa_latitude
        icon: mdi:latitude
        unit_of_measurement: "°"
        state: >
          {{ state_attr('device_tracker.DEIN_GERAET', 'latitude') | round(6) }}

      - name: "WoWa Längengrad"
        unique_id: wowa_longitude
        icon: mdi:longitude
        unit_of_measurement: "°"
        state: >
          {{ state_attr('device_tracker.DEIN_GERAET', 'longitude') | round(6) }}

      - name: "WoWa Standort Adresse"
        unique_id: wowa_standort_adresse
        icon: mdi:map-marker
        state: >
          {{ states('sensor.DEIN_GERAET_geocoded_location') }}

      - name: "WoWa Standort Zone"
        unique_id: wowa_standort_zone
        icon: mdi:map-marker-radius
        state: >
          {% if is_state('device_tracker.DEIN_GERAET', 'home') %}
            Zuhause (DEIN_HEIMATORT)
          {% else %}
            Unterwegs
          {% endif %}
