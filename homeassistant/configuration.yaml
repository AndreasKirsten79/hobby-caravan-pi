# Loads default set of integrations. Do not remove.
default_config:

frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
homeassistant:
  packages: !include_dir_named packages/

input_select:
  uss_prestige_view:
    name: USS Prestige View
    options:
      - Energie
      - Klima
      - Lichter
      - System
    initial: Energie

influxdb:
  max_retries: 3
  include:
    domains:
      - light
      - sensor
  default_measurement: state
  tags_attributes:
    - friendly_name

# ANPASSEN: IP-Adresse deines Shelly-Geräts für BLU-Geräte-Scan
# Das ist ein Shelly Gen2/Gen3 Gerät das als BLE-Gateway fungiert.
# Die IP findest du in der Shelly App oder in deinem Router (DHCP-Tabelle).
# Falls du keinen Shelly als BLE-Gateway nutzt, diesen Block entfernen.
rest_command:
  blug_scan:
    url: >-
      http://SHELLY_IP_ADRESSE/rpc/Script.Eval?id=1&code=BLE.Scanner.Start(%7Bduration_ms:5000,active:true%7D)
    method: GET
